<!DOCTYPE html>
<html>
<head>
    <title>Lane Racer V2</title>
    <style>
        body { background: #111; color: #fff; text-align: center; font-family: sans-serif; overflow: hidden; }
        canvas { background: #222; border: 2px solid #555; display: block; margin: 0 auto; }
        .btn-row { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .btn { width: 80px; height: 60px; background: #444; color: #fff; font-size: 24px; border: none; cursor: pointer; border-radius: 10px; }
        #restartBtn { margin-top: 10px; padding: 10px; display:none; }
    </style>
</head>
<body>
    <h2>LANE RACER</h2>
    <canvas id="raceCanvas" width="300" height="400"></canvas>
    <div class="btn-row">
        <button class="btn" id="lBtn">◀</button>
        <button class="btn" id="rBtn">▶</button>
    </div>
    <button id="restartBtn" onclick="init()">Restart Game</button>

    <script>
        const canvas = document.getElementById("raceCanvas");
        const ctx = canvas.getContext("2d");
        let playerLane, obstacles, gameActive, score;
        const laneX = [25, 125, 225]; // Left, Middle, Right positions

        function init() {
            playerLane = 1; // Start in Middle
            obstacles = [];
            gameActive = true;
            score = 0;
            document.getElementById("restartBtn").style.display = "none";
            requestAnimationFrame(loop);
        }

        function spawn() {
            if(!gameActive) return;
            obstacles.push({ x: laneX[Math.floor(Math.random()*3)], y: -50, w: 50, h: 70 });
            setTimeout(spawn, 1000);
        }

        function loop() {
            if(!gameActive) return;
            ctx.fillStyle = "#222";
            ctx.fillRect(0,0,300,400);

            // Draw Lanes
            ctx.strokeStyle = "#444";
            ctx.setLineDash([10, 10]);
            ctx.beginPath(); ctx.moveTo(100,0); ctx.lineTo(100,400); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(200,0); ctx.lineTo(200,400); ctx.stroke();

            // Player
            ctx.fillStyle = "cyan";
            ctx.fillRect(laneX[playerLane], 320, 50, 70);

            // Obstacles
            ctx.fillStyle = "magenta";
            obstacles.forEach((o, i) => {
                o.y += 5;
                ctx.fillRect(o.x, o.y, o.w, o.h);
                if(o.y > 400) { obstacles.splice(i, 1); score++; }
                // Collision
                if(playerLane === laneX.indexOf(o.x) && o.y > 250 && o.y < 390) {
                    gameActive = false;
                    document.getElementById("restartBtn").style.display = "block";
                }
            });

            requestAnimationFrame(loop);
        }

        document.getElementById("lBtn").onclick = () => { if(playerLane > 0) playerLane--; };
        document.getElementById("rBtn").onclick = () => { if(playerLane < 2) playerLane++; };
        spawn(); init();
    </script>
</body>
</html>
