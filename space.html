<!DOCTYPE html>
<html>
<head>
    <title>Gravity Sling V2</title>
    <style>
        body { background: #050505; color: #fff; text-align: center; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;}
        canvas { background: #000; border-radius: 50%; }
        #overlay { position: absolute; font-size: 40px; font-weight: bold; pointer-events: none; }
        button { margin-top: 20px; padding: 15px 30px; background: #0f0; border: none; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <div id="overlay"></div>
    <canvas id="gravCanvas" width="300" height="300"></canvas>
    <button id="resBtn" style="display:none;" onclick="startCountdown()">Retry</button>

    <script>
        const canvas = document.getElementById("gravCanvas");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");
        const resBtn = document.getElementById("resBtn");
        let angle, radius, rv, isPulling, gameActive;

        function startCountdown() {
            resBtn.style.display = "none";
            let count = 3;
            overlay.innerText = count;
            let timer = setInterval(() => {
                count--;
                if(count <= 0) {
                    clearInterval(timer);
                    overlay.innerText = "GO!";
                    setTimeout(() => overlay.innerText = "", 500);
                    initGame();
                } else {
                    overlay.innerText = count;
                }
            }, 1000);
        }

        function initGame() {
            angle = 0; radius = 100; rv = 0; isPulling = false; gameActive = true;
            requestAnimationFrame(loop);
        }

        function loop() {
            if(!gameActive) return;
            ctx.fillStyle = "black"; ctx.fillRect(0,0,300,300);
            
            // Planet
            ctx.fillStyle = "orange";
            ctx.beginPath(); ctx.arc(150, 150, 20, 0, Math.PI*2); ctx.fill();

            // Physics
            angle += 0.05;
            if(isPulling) rv -= 0.4; else rv += 0.3;
            rv *= 0.95; radius += rv;

            // Player
            let x = 150 + Math.cos(angle) * radius;
            let y = 150 + Math.sin(angle) * radius;
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI*2); ctx.fill();

            if(radius < 20 || radius > 150) {
                gameActive = false;
                overlay.innerText = "GAME OVER";
                resBtn.style.display = "block";
            }
            requestAnimationFrame(loop);
        }

        window.onmousedown = () => isPulling = true;
        window.onmouseup = () => isPulling = false;
        startCountdown();
    </script>
</body>
</html>
