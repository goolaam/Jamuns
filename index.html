    <style>
        :root {
            --electric-blue: #007BFF;
            --deep-black: #000000;
            --pure-white: #ffffff;
            --cog-color: rgba(0, 123, 255, 0.07);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--pure-white);
            color: var(--deep-black);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Animated Cog Background --- */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .cog {
            position: absolute;
            fill: var(--cog-color);
            animation: rotate 12s linear infinite;
        }

        .cog.rev { animation: rotate-rev 20s linear infinite; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        /* --- Header --- */
        header {
            padding: 6rem 1rem 4rem;
            text-align: center;
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -4px;
            margin: 0;
        }

        .logo span {
            display: block;
            color: var(--electric-blue);
            font-size: 0.4em;
            letter-spacing: 10px;
            margin-top: 10px;
        }

        /* --- Game Grid --- */
        .container {
            max-width: 900px;
            margin: 0 auto 5rem;
            padding: 0 20px;
            width: 100%;
        }

        .game-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .game-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--pure-white);
            border: 4px solid var(--deep-black);
            color: var(--deep-black);
            padding: 2.5rem 3rem;
            text-decoration: none;
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .game-button::after {
            content: 'PLAY NOW →';
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 900;
            background: var(--electric-blue);
            color: white;
            padding: 5px 15px;
            position: absolute;
            right: -100px;
            transition: right 0.3s ease;
        }

        .game-button:hover {
            background: var(--deep-black);
            color: var(--pure-white);
            transform: scale(1.02);
            box-shadow: 10px 10px 0px var(--electric-blue);
            padding-right: 8rem;
        }

        .game-button:hover::after {
            right: 2rem;
        }

        footer {
            margin-top: auto;
            text-align: center;
            padding: 3rem;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 2px;
            border-top: 1px solid #eee;
        }

        @media (max-width: 600px) {
            .game-button { padding: 1.5rem; font-size: 1rem; }
            .logo { letter-spacing: -2px; }
        }
    </style>
</head>
